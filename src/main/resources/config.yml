# 是否在控制台输出插件错误信息
console-logs: true

# 玩家死亡后是否重生回宾果出生点
respawn-teleport: true

# 若你在拥有专用宾果世界的 SMP 上使用，请设为 true
# 同时请务必设置该专用宾果世界的名称，以确保只有在该世界中的玩家
# 才会被强制加入新游戏或清空背包
multi-world-server: false

# 仅当上方设置启用时才会检查。如果你使用 Multiverse 等多世界插件，
# 请创建一个专用的宾果世界并在此填写世界名
bingo-world: default

# 是否将仅有一名玩家的游戏结果计入排行榜？
# 这可能会成为玩家刷分的方式，因此默认禁用
count-solo-games: false

# 洗牌模式：每次洗牌间隔多少分钟（默认：5）
# 必须为整数分钟，例如：1、5、10 等
shuffle-interval-minutes: 5

# 随机传送半径：从世界出生点算起的传送范围（默认：5000）
# 设置 0 则不限制范围，使用世界边界
teleport-radius: 5000

################################################
# 当前游戏配置 - 请勿手动修改
# 请在游戏中使用 /bingo gui 命令调整
################################################

difficulty: easy
card-size: small
unique-card: false
full-card: false
game-mode: traditional
reveal-cards: true
game-time: 0
player-loadout: 0